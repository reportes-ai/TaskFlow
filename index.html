<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1916;--text2:#6b6860;--text3:#9e9b93;
  --accent:#4f46e5;--accent-light:#eeedfd;--accent-text:#3730a3;
  --green:#16a34a;--green-light:#dcfce7;--green-text:#14532d;
  --amber:#d97706;--amber-light:#fef3c7;--amber-text:#92400e;
  --red:#dc2626;--red-light:#fee2e2;--red-text:#7f1d1d;
  --blue:#2563eb;--blue-light:#dbeafe;--blue-text:#1e3a8a;
  --gray-light:#f1f0ea;--gray-text:#57534e;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.1);
  font-family:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.logo-text{font-size:18px;font-weight:600;letter-spacing:-.5px}
.logo-text em{color:var(--accent);font-style:normal}
.sync-status{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;min-height:14px}
.user-card{margin:12px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.user-card:hover{border-color:var(--border2)}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.av-admin{background:#ede9fe;color:#5b21b6}
.av-user{background:#d1fae5;color:#065f46}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3);margin-top:1px}
.switch-link{font-size:10px;color:var(--accent);cursor:pointer;border:none;background:none;padding:0;white-space:nowrap}
.nav{padding:8px;flex:1;overflow-y:auto}
.nav-group-label{font-size:10px;color:var(--text3);padding:10px 10px 4px;letter-spacing:.6px;text-transform:uppercase;font-weight:500}
.nav-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-btn.active .nav-icon{opacity:1}
.badge{background:var(--accent-light);color:var(--accent-text);border-radius:20px;padding:1px 7px;font-size:10px;margin-left:auto;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.page-title{font-size:16px;font-weight:600;flex:1;letter-spacing:-.3px}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#4338ca}
.btn-danger{background:var(--red-light);color:var(--red-text);border-color:#fca5a588}
.btn-sm{padding:5px 12px;font-size:12px}
.content{flex:1;overflow-y:auto;padding:20px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filter-label{font-size:11px;color:var(--text3);font-weight:500}
.filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.filter-chip:hover{border-color:var(--border2)}
.filter-chip.active{background:var(--accent-light);color:var(--accent-text);border-color:#a5b4fc}
input[type=text],input[type=email],input[type=password],input[type=date],textarea,select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b6860' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.task-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.tc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.tc-title{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.tc-desc{font-size:12px;color:var(--text2);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.tc-footer{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.tc-avatars{display:flex;align-items:center}
.tc-avatars .avatar{width:20px;height:20px;font-size:8px;margin-left:-4px;border:1.5px solid var(--surface)}
.tc-avatars .avatar:first-child{margin-left:0}
.pbar-wrap{height:3px;background:var(--surface2);border-radius:3px;flex:1;max-width:70px}
.pbar{height:3px;border-radius:3px;background:var(--accent)}
.stage-row{display:flex;margin:8px 0 10px}
.stage-cell{flex:1;text-align:center;font-size:9px;padding:3px 2px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);border-right:none;font-weight:500}
.stage-cell:first-child{border-radius:4px 0 0 4px}
.stage-cell:last-child{border-radius:0 4px 4px 0;border-right:1px solid var(--border)}
.stage-cell.done{background:var(--green-light);color:var(--green-text);border-color:#86efac}
.stage-cell.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.p-pending{background:var(--amber-light);color:var(--amber-text)}
.p-progress{background:var(--accent-light);color:var(--accent-text)}
.p-review{background:var(--blue-light);color:var(--blue-text)}
.p-done{background:var(--green-light);color:var(--green-text)}
.p-blocked{background:var(--red-light);color:var(--red-text)}
.p-low{background:var(--gray-light);color:var(--gray-text)}
.p-med{background:var(--amber-light);color:var(--amber-text)}
.p-high{background:var(--red-light);color:var(--red-text)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;border-radius:var(--radius-xl) var(--radius-xl) 0 0}
.modal-title{font-size:15px;font-weight:600;flex:1;letter-spacing:-.3px}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.2px;text-transform:uppercase}
.close-btn{width:30px;height:30px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:20px;line-height:1}
.close-btn:hover{background:var(--surface2)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;border-top:none;border-left:none;border-right:none;background:none;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.comment-card{background:var(--surface2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.cc-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cc-author{font-size:12px;font-weight:500}
.cc-date{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.cc-text{font-size:13px;color:var(--text2);line-height:1.5}
.progress-timeline{border-left:2px solid var(--border);padding-left:14px;margin-bottom:12px}
.pt-entry{position:relative;margin-bottom:12px}
.pt-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:absolute;left:-19px;top:5px}
.pt-meta{font-size:11px;color:var(--text3);margin-bottom:2px;font-family:'DM Mono',monospace}
.pt-text{font-size:13px;color:var(--text);line-height:1.4}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.stat-num{font-size:28px;font-weight:600;color:var(--accent);letter-spacing:-1px;font-family:'DM Mono',monospace}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:8px 12px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.data-table td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2)}
.sec-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.empty{text-align:center;padding:52px 20px;color:var(--text3)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}
.checkbox-list{display:flex;flex-direction:column;gap:8px}
.checkbox-list label{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius);transition:background .15s}
.checkbox-list label:hover{background:var(--surface2)}
.checkbox-list input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}
.pbar-full{height:8px;background:var(--surface2);border-radius:8px;overflow:hidden}
.pbar-full .pbar{height:8px}
.realtime-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pin-wrap{display:flex;gap:10px;justify-content:center;margin:12px 0}
.pin-input{width:52px;height:52px;text-align:center;font-size:22px;font-weight:600;border:2px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;outline:none;transition:border-color .15s}
.pin-input:focus{border-color:var(--accent)}
.error-msg{color:var(--red);font-size:12px;text-align:center;min-height:16px;margin-top:4px}
</style>
</head>

const fmtDue=s=>{if(!s||s==='—')return '—';const p=s.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s;};
const toIsoDate=s=>{if(!s||s==='—')return null;if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const p=s.split(/[/\-]/);if(p.length===3&&p[2].length===4)return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;return s;};

async function loadAll(){
  setSyncStatus('sincronizando...');
  const [uR,tR,pR,cR]=await Promise.all([
    db.from('tf_users').select('*').order('created_at'),
    db.from('tf_tasks').select('*').order('created_at',{ascending:false}),
    db.from('tf_progress').select('*').order('created_at'),
    db.from('tf_comments').select('*').order('created_at'),
  ]);
  DATA.users=uR.data||[];
  DATA.tasks=tR.data||[];
  DATA.progress={};
  (pR.data||[]).forEach(p=>{if(!DATA.progress[p.task_id])DATA.progress[p.task_id]=[];DATA.progress[p.task_id].push(p);});
  DATA.comments={};
  (cR.data||[]).forEach(c=>{if(!DATA.comments[c.task_id])DATA.comments[c.task_id]=[];DATA.comments[c.task_id].push(c);});
  setSyncStatus('<span class="realtime-dot"></span>En vivo · <span style="font-family:var(--font-mono,monospace);font-size:10px">v1.1</span>');
  updateBadges();
  if(S.user) renderView();
}

function setSyncStatus(html){const el=document.getElementById('sync-status');if(el)el.innerHTML=html;}

function subscribeRealtime(){
  db.channel('tf-live')
    .on('postgres_changes',{event:'*',schema:'public',table:'tf_tasks'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'tf_progress'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'tf_comments'},()=>loadAll())
    .on('postgres_changes',{event:'*',schema:'public',table:'tf_users'},()=>loadAll())
    .subscribe();
}

function showSwitchUser(){
  openModal(`
    <div class="modal-head"><div class="modal-title">Seleccionar perfil</div></div>
    <div class="modal-body" style="gap:8px">
      ${DATA.users.map(u=>`
        <div onclick="askPin('${u.id}')" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s" onmouseenter="this.style.background='var(--accent-light)';this.style.borderColor='#a5b4fc'" onmouseleave="this.style.background='';this.style.borderColor='var(--border)'">
          <div class="avatar ${u.color}" style="width:40px;height:40px;font-size:14px">${u.initials}</div>
          <div style="flex:1"><div style="font-weight:500;font-size:14px">${u.name}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${u.role==='admin'?'Administrador':'Usuario'} · PIN requerido</div></div>
          ${u.role==='admin'?'<span class="pill p-progress">Admin</span>':''}
        </div>`).join('')}
    </div>`,false);
}

function askPin(userId){
  const u=DATA.users.find(x=>x.id===userId);
  openModal(`
    <div class="modal-head">
      <div class="avatar ${u.color}" style="width:36px;height:36px;font-size:13px">${u.initials}</div>
      <div class="modal-title">${u.name}</div>
      <button class="close-btn" onclick="showSwitchUser()">×</button>
    </div>
    <div class="modal-body" style="align-items:center;text-align:center">
      <div style="font-size:13px;color:var(--text2)">Ingresa tu PIN de 4 dígitos</div>
      <div class="pin-wrap">
        <input class="pin-input" type="password" maxlength="1" id="p0" oninput="pinNext(this,1,'${userId}')" onkeydown="pinKey(event,this,-1)">
        <input class="pin-input" type="password" maxlength="1" id="p1" oninput="pinNext(this,2,'${userId}')" onkeydown="pinKey(event,this,0)">
        <input class="pin-input" type="password" maxlength="1" id="p2" oninput="pinNext(this,3,'${userId}')" onkeydown="pinKey(event,this,1)">
        <input class="pin-input" type="password" maxlength="1" id="p3" oninput="checkPin('${userId}')" onkeydown="pinKey(event,this,2)">
      </div>
      <div class="error-msg" id="pin-err"></div>
    </div>`,false);
  setTimeout(()=>document.getElementById('p0')?.focus(),100);
}

function pinNext(el,nextIdx,userId){if(el.value.length===1&&nextIdx<=3)document.getElementById('p'+nextIdx)?.focus();}
function pinKey(e,el,prevIdx){if(e.key==='Backspace'&&el.value===''&&prevIdx>=0)document.getElementById('p'+prevIdx)?.focus();}

function checkPin(userId){
  const pin=[0,1,2,3].map(i=>document.getElementById('p'+i)?.value||'').join('');
  if(pin.length<4) return;
  const u=DATA.users.find(x=>x.id===userId);
  if(pin===(u.pin||'1234')){
    S.user=u;closeModal();updateSidebar();nav('tasks',document.getElementById('nb-tasks'));
  } else {
    document.getElementById('pin-err').textContent='PIN incorrecto';
    [0,1,2,3].forEach(i=>{const el=document.getElementById('p'+i);if(el){el.value='';el.style.borderColor='var(--red)';}});
    setTimeout(()=>{[0,1,2,3].forEach(i=>{const el=document.getElementById('p'+i);if(el)el.style.borderColor='';});document.getElementById('pin-err').textContent='';document.getElementById('p0')?.focus();},1200);
  }
}

function updateSidebar(){
  const u=S.user;
  const av=document.getElementById('sb-avatar');if(!av) return;
  av.className='avatar '+(u.color||'av-user');av.textContent=u.initials;
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role').textContent=u.role==='admin'?'Administrador':'Usuario';
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display=u.role==='admin'?'':'none');
  updateBadges();
}

function updateBadges(){
  const a=document.getElementById('bdg-all'),m=document.getElementById('bdg-my');
  if(a) a.textContent=DATA.tasks.length;
  if(m&&S.user) m.textContent=DATA.tasks.filter(t=>(t.assignees||[]).includes(S.user.id)).length;
}

function nav(view,btn){
  if(!S.user) return;
  S.view=view;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderView();
}

function renderView(){
  const titles={tasks:'Todas las tareas',my:'Mis tareas',reports:'Reportes',users:'Gestión de usuarios'};
  const pt=document.getElementById('pg-title');if(pt) pt.textContent=titles[S.view]||'';
  const act=document.getElementById('tb-actions');
  if(act){
    if(S.view==='tasks'||S.view==='my') act.innerHTML=S.user.role==='admin'?`<button class="btn btn-primary" onclick="openNewTask()">+ Nueva tarea</button>`:'';
    else if(S.view==='users') act.innerHTML=`<button class="btn btn-primary" onclick="openNewUser()">+ Nuevo usuario</button>`;
    else act.innerHTML='';
  }
  if(S.view==='tasks') renderTasks(DATA.tasks);
  else if(S.view==='my') renderTasks(DATA.tasks.filter(t=>(t.assignees||[]).includes(S.user.id)));
  else if(S.view==='reports') renderReports();
  else if(S.view==='users') renderUsers();
}

function renderTasks(tasks){
  const users=DATA.users.filter(u=>u.role==='user');
  document.getElementById('content').innerHTML=`
    <div class="filters">
      <span class="filter-label">Estado</span>
      ${['all',...STAGES].map(s=>`<button class="filter-chip ${S.fStatus===s?'active':''}" onclick="setF('s','${s}')">${s==='all'?'Todos':s}</button>`).join('')}
      <span class="filter-label" style="margin-left:8px">Persona</span>
      <button class="filter-chip ${S.fUser==='all'?'active':''}" onclick="setF('u','all')">Todos</button>
      ${users.map(u=>`<button class="filter-chip ${S.fUser===u.id?'active':''}" onclick="setF('u','${u.id}')">${u.name.split(' ')[0]}</button>`).join('')}
    </div><div id="tlist"></div>`;
  renderList(tasks);
}

function renderList(tasks){
  let f=tasks;
  if(S.fStatus!=='all') f=f.filter(t=>t.status===S.fStatus);
  if(S.fUser!=='all') f=f.filter(t=>(t.assignees||[]).includes(S.fUser));
  const el=document.getElementById('tlist');if(!el) return;
  if(!f.length){el.innerHTML=`<div class="empty"><div style="font-size:36px;margin-bottom:12px">📋</div><div>Sin tareas</div></div>`;return;}
  el.innerHTML=f.map(t=>`<div class="task-card" onclick="openTask('${t.id}')">
    <div class="tc-header"><div class="tc-title">${t.title}</div><span class="pill ${sC(t.status)}">${t.status}</span></div>
    <div class="tc-desc">${t.description||''}</div>
    <div class="stage-row">${STAGES.map((s,i)=>`<div class="stage-cell ${i<t.stage?'done':i===t.stage?'active':''}">${s.substring(0,4)}</div>`).join('')}</div>
    <div class="tc-footer">
      <span class="pill ${pC(t.priority)}">${t.priority}</span>
      <div class="tc-avatars">${(t.assignees||[]).map(id=>{const u=DATA.users.find(x=>x.id===id);return u?`<div class="avatar ${u.color}" style="width:20px;height:20px;font-size:8px;border:1.5px solid var(--surface)" title="${u.name}">${u.initials}</div>`:''}).join('')}</div>
      <div class="pbar-wrap"><div class="pbar" style="width:${t.progress}%"></div></div>
      <span>${t.progress}%</span>
      <span style="margin-left:auto">📅 ${fmtDue(t.due_date)}</span>
      ${(DATA.comments[t.id]||[]).length?`<span>💬 ${(DATA.comments[t.id]||[]).length}</span>`:''}
    </div>
  </div>`).join('');
}

function setF(type,val){if(type==='s')S.fStatus=val;else S.fUser=val;renderView();}

function openTask(id){
  curTaskId=id;
  const t=DATA.tasks.find(x=>x.id===id);if(!t) return;
  const isAdmin=S.user.role==='admin';
  const canEdit=isAdmin||(t.assignees||[]).includes(S.user.id);
  const pLogs=DATA.progress[id]||[];
  const coms=DATA.comments[id]||[];
  openModal(`
    <div class="modal-head">
      <span class="pill ${sC(t.status)}">${t.status}</span>
      <div class="modal-title">${t.title}</div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('detail',this)">Detalle</button>
        <button class="tab" onclick="switchTab('progress',this)">Avances (${pLogs.length})</button>
        <button class="tab" onclick="switchTab('comments',this)">Comentarios (${coms.length})</button>
      </div>
      <div id="tab-body"></div>
    </div>
    <div class="modal-foot">
      ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteTask('${t.id}')">Eliminar</button>`:''}
      <div style="flex:1"></div>
      ${canEdit?`<button class="btn btn-primary btn-sm" onclick="openEditTask('${t.id}')">Editar</button>`:''}
      <button class="btn btn-sm" onclick="closeModal()">Cerrar</button>
    </div>`);
  showTab('detail');
}

function switchTab(tab,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');showTab(tab);}

function showTab(tab){
  const t=DATA.tasks.find(x=>x.id===curTaskId);
  const c=document.getElementById('tab-body');if(!t||!c) return;
  const pLogs=DATA.progress[t.id]||[];
  const coms=DATA.comments[t.id]||[];
  const canLog=(t.assignees||[]).includes(S.user.id)||S.user.role==='admin';
  if(tab==='detail'){
    c.innerHTML=`
      <div class="form-group"><div class="form-label">Descripción</div><div style="font-size:13px;color:var(--text2);line-height:1.6">${t.description||'—'}</div></div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">Prioridad</div><span class="pill ${pC(t.priority)}">${t.priority}</span></div>
        <div class="form-group"><div class="form-label">Fecha límite</div><div style="font-size:13px">📅 ${fmtDue(t.due_date)}</div></div>
      </div>
      <div class="form-group"><div class="form-label">Etapa</div>
        <div class="stage-row" style="margin:4px 0">${STAGES.map((s,i)=>`<div class="stage-cell ${i<t.stage?'done':i===t.stage?'active':''}">${s}</div>`).join('')}</div>
      </div>
      <div class="form-group"><div class="form-label">Progreso — ${t.progress}%</div>
        <div class="pbar-full"><div class="pbar" style="width:${t.progress}%"></div></div>
      </div>
      <div class="form-group"><div class="form-label">Asignados</div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
          ${(t.assignees||[]).map(id=>{const u=DATA.users.find(x=>x.id===id);return u?`<div style="display:flex;align-items:center;gap:8px"><div class="avatar ${u.color}" style="width:26px;height:26px;font-size:10px">${u.initials}</div><span style="font-size:13px">${u.name}</span></div>`:''}).join('')}
          ${!(t.assignees||[]).length?'<span style="color:var(--text3);font-size:13px">Sin asignar</span>':''}
        </div>
      </div>`;
  } else if(tab==='progress'){
    c.innerHTML=`
      <div class="sec-label">Historial de avances</div>
      ${pLogs.length?`<div class="progress-timeline">${[...pLogs].reverse().map(e=>`<div class="pt-entry"><div class="pt-dot"></div><div class="pt-meta">${fmtDate(e.created_at)} · ${uName(e.user_id)} · <span class="pill p-progress" style="font-size:10px;padding:1px 6px">${e.pct}%</span></div><div class="pt-text">${e.text}</div></div>`).join('')}</div>`
      :`<div style="color:var(--text3);font-size:13px;margin-bottom:14px">Sin avances registrados.</div>`}
      ${canLog?`
        <div class="sec-label" style="margin-top:4px">Reportar avance</div>
        <div class="form-group"><div class="form-label">Descripción</div><textarea id="p-txt" placeholder="¿Qué se avanzó?"></textarea></div>
        <div class="form-row">
          <div class="form-group"><div class="form-label">Progreso (%)</div><input type="text" id="p-pct" value="${t.progress}"></div>
          <div class="form-group"><div class="form-label">Nuevo estado</div><select id="p-stat">${STAGES.map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <button class="btn btn-primary btn-sm" id="btn-log" onclick="logProgress()">Guardar avance</button>`:''}`;
  } else {
    c.innerHTML=`
      ${coms.length?[...coms].reverse().map(cm=>`<div class="comment-card"><div class="cc-header"><div class="avatar ${uCol(cm.user_id)}" style="width:24px;height:24px;font-size:9px">${uInit(cm.user_id)}</div><span class="cc-author">${uName(cm.user_id)}</span><span class="cc-date">${fmtDate(cm.created_at)}</span></div><div class="cc-text">${cm.text}</div></div>`).join('')
      :`<div style="color:var(--text3);font-size:13px;margin-bottom:12px">Sin comentarios aún.</div>`}
      <div class="sec-label" style="margin-top:8px">Añadir comentario</div>
      <textarea id="c-txt" placeholder="Escribe tu comentario..."></textarea>
      <button class="btn btn-primary btn-sm" id="btn-com" style="margin-top:8px" onclick="addComment()">Publicar</button>`;
  }
}

async function logProgress(){
  const t=DATA.tasks.find(x=>x.id===curTaskId);
  const txt=document.getElementById('p-txt')?.value.trim();
  const pct=Math.min(100,Math.max(0,parseInt(document.getElementById('p-pct')?.value)||t.progress));
  const stat=document.getElementById('p-stat')?.value;
  if(!txt){toast('Escribe una descripción');return;}
  const btn=document.getElementById('btn-log');
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  const {error:e1}=await db.from('tf_progress').insert({task_id:t.id,user_id:S.user.id,text:txt,pct});
  if(e1){toast('Error: '+e1.message);if(btn){btn.disabled=false;btn.textContent='Guardar avance';}return;}
  await db.from('tf_tasks').update({progress:pct,status:stat,stage:STAGES.indexOf(stat),}).eq('id',t.id);
  toast('Avance guardado');await loadAll();
}

async function addComment(){
  const txt=document.getElementById('c-txt')?.value.trim();
  if(!txt){toast('Escribe un comentario');return;}
  const btn=document.getElementById('btn-com');
  if(btn){btn.disabled=true;btn.textContent='Publicando...';}
  const {error}=await db.from('tf_comments').insert({task_id:curTaskId,user_id:S.user.id,text:txt});
  if(error){toast('Error: '+error.message);if(btn){btn.disabled=false;btn.textContent='Publicar';}return;}
  toast('Comentario publicado');await loadAll();
}

function openNewTask(){
  const users=DATA.users.filter(u=>u.role==='user');
  openModal(`
    <div class="modal-head"><div class="modal-title">Nueva tarea</div><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><div class="form-label">Título *</div><input type="text" id="nt-ti" placeholder="Título de la tarea"></div>
      <div class="form-group"><div class="form-label">Descripción</div><textarea id="nt-de" placeholder="Descripción detallada..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">Prioridad</div><select id="nt-pr">${PRIOS.map(p=>`<option>${p}</option>`).join('')}</select></div>
        <div class="form-group"><div class="form-label">Fecha límite</div><input type="date" id="nt-du"></div>
      </div>
      <div class="form-group"><div class="form-label">Asignar a</div>
        <div class="checkbox-list">${users.map(u=>`<label><input type="checkbox" value="${u.id}" class="ac"> <div class="avatar ${u.color}" style="width:22px;height:22px;font-size:9px">${u.initials}</div> ${u.name}</label>`).join('')}</div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="btn-create" onclick="createTask()">Crear tarea</button></div>`);

async function createTask(){
  const ti=document.getElementById('nt-ti').value.trim();
  if(!ti){toast('El título es obligatorio');return;}
  const btn=document.getElementById('btn-create');
  if(btn){btn.disabled=true;btn.textContent='Creando...';}
  const {error}=await db.from('tf_tasks').insert({
    id:uid(),title:ti,
    description:document.getElementById('nt-de').value||'',
    status:'Pendiente',priority:document.getElementById('nt-pr').value,
    assignees:[...document.querySelectorAll('.ac:checked')].map(e=>e.value),
    stage:0,progress:0,
    due_date:document.getElementById('nt-du').value||'—',
    created_by:S.user.id
  });
  if(error){toast('Error: '+error.message);if(btn){btn.disabled=false;btn.textContent='Crear tarea';}return;}
  closeModal();toast('Tarea creada');await loadAll();
}

function openEditTask(id){
  closeModal();
  const t=DATA.tasks.find(x=>x.id===id);
  const users=DATA.users.filter(u=>u.role==='user');
  openModal(`
    <div class="modal-head"><div class="modal-title">Editar tarea</div><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><div class="form-label">Título</div><input type="text" id="et-ti" value="${t.title}"></div>
      <div class="form-group"><div class="form-label">Descripción</div><textarea id="et-de">${t.description||''}</textarea></div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">Prioridad</div><select id="et-pr">${PRIOS.map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select></div>
        <div class="form-group"><div class="form-label">Estado</div><select id="et-st">${STAGES.map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="form-group"><div class="form-label">Fecha límite</div><input type="date" id="et-du" value="${t.due_date&&t.due_date!=='—'?t.due_date:''}"></div>
      <div class="form-group"><div class="form-label">Asignar a</div>
        <div class="checkbox-list">${users.map(u=>`<label><input type="checkbox" value="${u.id}" class="ac" ${(t.assignees||[]).includes(u.id)?'checked':''}> <div class="avatar ${u.color}" style="width:22px;height:22px;font-size:9px">${u.initials}</div> ${u.name}</label>`).join('')}</div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="btn-save" onclick="saveTask('${t.id}')">Guardar</button></div>`);
}

async function saveTask(id){
  const btn=document.getElementById('btn-save');
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  const stat=document.getElementById('et-st').value;
  const {error}=await db.from('tf_tasks').update({
    title:document.getElementById('et-ti').value,
    description:document.getElementById('et-de').value,
    priority:document.getElementById('et-pr').value,
    status:stat,stage:STAGES.indexOf(stat),
    due_date:document.getElementById('et-du').value||'—',
    assignees:[...document.querySelectorAll('.ac:checked')].map(e=>e.value),
    
  }).eq('id',id);
  if(error){toast('Error: '+error.message);if(btn){btn.disabled=false;btn.textContent='Guardar';}return;}
  closeModal();toast('Tarea actualizada');await loadAll();
}

async function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea?')) return;
  await db.from('tf_tasks').delete().eq('id',id);
  closeModal();toast('Tarea eliminada');await loadAll();
}

function renderReports(){
  document.getElementById('content').innerHTML=`<div class="tabs"><button class="tab active" onclick="sRT('general',this)">General</button><button class="tab" onclick="sRT('bytask',this)">Por tarea</button><button class="tab" onclick="sRT('byuser',this)">Por usuario</button></div><div id="rc"></div>`;
  showRT('general');
}
function sRT(tab,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');showRT(tab);}
function showRT(tab){
  const c=document.getElementById('rc');if(!c) return;
  const tasks=DATA.tasks;const total=tasks.length;
  const byS={};STAGES.forEach(s=>byS[s]=0);tasks.forEach(t=>byS[t.status]=(byS[t.status]||0)+1);
  if(tab==='general'){
    const avg=total?Math.round(tasks.reduce((a,t)=>a+t.progress,0)/total):0;
    c.innerHTML=`<div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total tareas</div></div>
      <div class="stat-card"><div class="stat-num">${byS['Completada']||0}</div><div class="stat-label">Completadas</div></div>
      <div class="stat-card"><div class="stat-num">${byS['En progreso']||0}</div><div class="stat-label">En progreso</div></div>
      <div class="stat-card"><div class="stat-num">${byS['Bloqueada']||0}</div><div class="stat-label">Bloqueadas</div></div>
      <div class="stat-card"><div class="stat-num">${avg}%</div><div class="stat-label">Avance prom.</div></div>
    </div>
    <div class="sec-label">Por estado</div>
    <table class="data-table"><thead><tr><th>Estado</th><th>Cantidad</th><th>%</th></tr></thead><tbody>
    ${STAGES.map(s=>`<tr><td><span class="pill ${sC(s)}">${s}</span></td><td>${byS[s]||0}</td><td>${total?Math.round((byS[s]||0)*100/total):0}%</td></tr>`).join('')}
    </tbody></table>`;
  } else if(tab==='bytask'){
    c.innerHTML=`<table class="data-table"><thead><tr><th>Tarea</th><th>Estado</th><th>Progreso</th><th>Asignados</th><th>Vence</th></tr></thead><tbody>
    ${tasks.map(t=>`<tr><td style="font-weight:500">${t.title}</td><td><span class="pill ${sC(t.status)}" style="font-size:10px">${t.status}</span></td>
    <td><div style="display:flex;align-items:center;gap:6px"><div class="pbar-wrap" style="width:60px;height:6px"><div class="pbar" style="height:6px;width:${t.progress}%"></div></div>${t.progress}%</div></td>
    <td style="font-size:12px">${(t.assignees||[]).map(id=>uName(id).split(' ')[0]).join(', ')||'—'}</td>
    <td style="font-size:12px">${fmtDue(t.due_date)}</td></tr>`).join('')}
    </tbody></table>`;
  } else {
    const users=DATA.users.filter(u=>u.role==='user');
    c.innerHTML=`<table class="data-table"><thead><tr><th>Usuario</th><th>Asignadas</th><th>Completadas</th><th>En progreso</th><th>Avance prom.</th></tr></thead><tbody>
    ${users.map(u=>{
      const mine=tasks.filter(t=>(t.assignees||[]).includes(u.id));
      const done=mine.filter(t=>t.status==='Completada').length;
      const prog=mine.filter(t=>t.status==='En progreso').length;
      const avg=mine.length?Math.round(mine.reduce((a,t)=>a+t.progress,0)/mine.length):0;
      return `<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="avatar ${u.color}" style="width:26px;height:26px;font-size:10px">${u.initials}</div><span style="font-weight:500">${u.name}</span></div></td><td>${mine.length}</td><td>${done}</td><td>${prog}</td><td>${avg}%</td></tr>`;
    }).join('')}</tbody></table>`;
  }
}

function renderUsers(){
  const users=DATA.users.filter(u=>u.id!=='admin');
  document.getElementById('content').innerHTML=`
    <div class="stat-grid" style="max-width:280px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-num">${users.length}</div><div class="stat-label">Usuarios</div></div>
      <div class="stat-card"><div class="stat-num">${DATA.tasks.length}</div><div class="stat-label">Tareas</div></div>
    </div>
    <div class="sec-label">Usuarios del sistema</div>
    <table class="data-table"><thead><tr><th>Usuario</th><th>Email</th><th>PIN</th><th>Tareas</th><th></th></tr></thead><tbody>
    ${users.map(u=>{
      const n=DATA.tasks.filter(t=>(t.assignees||[]).includes(u.id)).length;
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px"><div class="avatar ${u.color}" style="width:30px;height:30px;font-size:11px">${u.initials}</div><span style="font-weight:500">${u.name}</span></div></td>
        <td style="color:var(--text2)">${u.email}</td>
        <td><span style="font-family:'DM Mono',monospace">${u.pin||'1234'}</span> <button class="btn btn-sm" style="font-size:10px;padding:2px 8px;margin-left:6px" onclick="editPin('${u.id}')">cambiar</button></td>
        <td>${n}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Eliminar</button></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function openNewUser(){
  openModal(`
    <div class="modal-head"><div class="modal-title">Crear usuario</div><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><div class="form-label">Nombre completo *</div><input type="text" id="nu-na" placeholder="Nombre Apellido"></div>
      <div class="form-group"><div class="form-label">Email *</div><input type="text" id="nu-em" placeholder="usuario@empresa.com"></div>
      <div class="form-group"><div class="form-label">PIN de acceso (4 dígitos)</div><input type="text" id="nu-pi" placeholder="1234" maxlength="4" style="font-family:'DM Mono',monospace;letter-spacing:6px;font-size:20px;text-align:center"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="btn-nu" onclick="createUser()">Crear usuario</button></div>`);
}

async function createUser(){
  const name=document.getElementById('nu-na').value.trim();
  const email=document.getElementById('nu-em').value.trim();
  const pin=document.getElementById('nu-pi').value.trim()||'1234';
  if(!name||!email){toast('Completa nombre y email');return;}
  if(!/^\d{4}$/.test(pin)){toast('El PIN debe ser 4 dígitos numéricos');return;}
  const btn=document.getElementById('btn-nu');
  if(btn){btn.disabled=true;btn.textContent='Creando...';}
  const parts=name.split(' ');
  const initials=(parts[0][0]+(parts[1]?parts[1][0]:parts[0][1]||'')).toUpperCase();
  const {error}=await db.from('tf_users').insert({id:uid(),name,email,role:'user',initials,color:'av-user',pin});
  if(error){toast('Error: '+error.message);if(btn){btn.disabled=false;btn.textContent='Crear usuario';}return;}
  closeModal();toast('Usuario creado');await loadAll();
}

function editMyPin(){
  if(!S.user){toast('Selecciona un perfil primero');return;}
  editPin(S.user.id);
}

function editPin(userId){
  const u=DATA.users.find(x=>x.id===userId);
  openModal(`
    <div class="modal-head"><div class="modal-title">Cambiar PIN — ${u.name}</div><button class="close-btn" onclick="closeModal()">×</button></div>
    <div class="modal-body" style="align-items:center;text-align:center">
      <div style="font-size:13px;color:var(--text2)">PIN actual</div>
      <div class="pin-wrap">
        <input class="pin-input" type="password" maxlength="1" id="op0" oninput="if(this.value)document.getElementById('op1').focus()">
        <input class="pin-input" type="password" maxlength="1" id="op1" oninput="if(this.value)document.getElementById('op2').focus()" onkeydown="if(event.key==='Backspace'&&!this.value)document.getElementById('op0').focus()">
        <input class="pin-input" type="password" maxlength="1" id="op2" oninput="if(this.value)document.getElementById('op3').focus()" onkeydown="if(event.key==='Backspace'&&!this.value)document.getElementById('op1').focus()">
        <input class="pin-input" type="password" maxlength="1" id="op3" onkeydown="if(event.key==='Backspace'&&!this.value)document.getElementById('op2').focus()">
      </div>
      <div style="font-size:13px;color:var(--text2);margin-top:8px">Nuevo PIN</div>
      <div class="pin-wrap">
        <input class="pin-input" type="password" maxlength="1" id="np0" oninput="if(this.value)document.getElementById('np1').focus()">
        <input class="pin-input" type="password" maxlength="1" id="np1" oninput="if(this.value)document.getElementById('np2').focus()" onkeydown="if(event.key==='Backspace'&&!this.value)document.getElementById('np0').focus()">
        <input class="pin-input" type="password" maxlength="1" id="np2" oninput="if(this.value)document.getElementById('np3').focus()" onkeydown="if(event.key==='Backspace'&&!this.value)document.getElementById('np1').focus()">
        <input class="pin-input" type="password" maxlength="1" id="np3" onkeydown="if(event.key==='Backspace'&&!this.value)document.getElementById('np2').focus()">
      </div>
      <div class="error-msg" id="pin-chg-err"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="savePin('${userId}')">Guardar PIN</button></div>`);
  setTimeout(()=>document.getElementById('op0')?.focus(),100);
}

async function savePin(userId){
  const u=DATA.users.find(x=>x.id===userId);
  const oldPin=[0,1,2,3].map(i=>document.getElementById('op'+i)?.value||'').join('');
  const newPin=[0,1,2,3].map(i=>document.getElementById('np'+i)?.value||'').join('');
  const errEl=document.getElementById('pin-chg-err');
  if(oldPin!==(u.pin||'1234')){if(errEl)errEl.textContent='PIN actual incorrecto';return;}
  if(!/^\d{4}$/.test(newPin)){if(errEl)errEl.textContent='El nuevo PIN debe ser 4 dígitos';return;}
  const {error}=await db.from('tf_users').update({pin:newPin}).eq('id',userId);
  if(error){toast('Error al guardar: '+error.message);console.error(error);return;}
  // Actualizar en memoria
  if(S.user&&S.user.id===userId) S.user.pin=newPin;
  closeModal();toast('PIN actualizado correctamente');
}

async function deleteUser(id){
  const u=DATA.users.find(x=>x.id===id);
  if(!u||!confirm(`¿Eliminar a ${u.name}?`)) return;
  const affected=DATA.tasks.filter(t=>(t.assignees||[]).includes(id));
  for(const t of affected) await db.from('tf_tasks').update({assignees:t.assignees.filter(a=>a!==id)}).eq('id',t.id);
  await db.from('tf_users').delete().eq('id',id);
  toast('Usuario eliminado');await loadAll();
}

function openModal(html,closeable=true){
  const o=document.getElementById('overlay');
  o.innerHTML=`<div class="modal">${html}</div>`;
  o.style.display='flex';
  o.onclick=closeable?e=>{if(e.target===o)closeModal();}:null;
}
function closeModal(){const o=document.getElementById('overlay');o.style.display='none';o.innerHTML='';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

init();
</script>
</body>
</html>
